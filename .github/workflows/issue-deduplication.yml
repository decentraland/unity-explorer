name: Issue Deduplication
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to test against'
        required: true
jobs:
  deduplicate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Check for duplicate issues
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Analyze this new issue and check if it's a duplicate of existing issues in the repository.
            Issue: #${{ github.event.issue.number || github.event.inputs.issue_number }}
            Repository: ${{ github.repository }}
            Your task:
            1. Get details of the current issue using: gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title,body,labels
            2. Search for similar existing issues using relevant keywords from the issue title and body
            3. Compare the new issue with existing ones to identify potential duplicates
            Criteria for duplicates:
            - Same bug or error being reported
            - Same feature request (even if worded differently)
            - Same question being asked
            - Issues describing the same root problem
            If you find duplicates:
            - Add a comment on the new issue linking to the original issue(s)
            - Apply a "duplicate" label to the new issue
            - Be polite and explain why it's a duplicate
            - Suggest the user follow the original issue for updates
            If it's NOT a duplicate:
            - Don't add any comments
            - You may apply appropriate topic labels based on the issue content
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --model claude-haiku-4-5-20251001 --allowedTools "Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh label list:*),Bash(gh label create:*)"
