name: Upload Latest Build to Epic Store

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Select the platform(s) to upload"
        required: true
        default: "both"
        type: choice
        options:
          - windows
          - mac
          - both

jobs:
  upload-to-epic-store:
    runs-on: windows-latest


    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Set platform flags
      id: platforms
      run: |
        $p = "${{ github.event.inputs.platform }}"
        echo "build_windows=$($p -eq 'windows' -or $p -eq 'both')" >> $env:GITHUB_OUTPUT
        echo "build_mac=$($p -eq 'mac' -or $p -eq 'both')" >> $env:GITHUB_OUTPUT

    - name: Get the latest release info
      id: get_release
      run: |
        $releaseData = Invoke-RestMethod -Uri "https://api.github.com/repos/decentraland/unity-explorer/releases/latest"
        $version = $releaseData.tag_name
        $windowsUrl = ($releaseData.assets | Where-Object { $_.name -eq "Decentraland_windows64_epic.zip" }).browser_download_url
        $macosUrl = ($releaseData.assets | Where-Object { $_.name -eq "Decentraland_macos_epic.zip" }).browser_download_url

        Write-Host "Release version: $version"
        Write-Host "Windows download URL: $windowsUrl"
        Write-Host "macOS download URL: $macosUrl"

        $platform = "${{ github.event.inputs.platform }}"
        if (-not $windowsUrl -and ($platform -eq "windows" -or $platform -eq "both")) {
          Write-Error "Windows asset (Decentraland_windows64_epic.zip) not found in latest release $version"
          exit 1
        }
        if (-not $macosUrl -and ($platform -eq "mac" -or $platform -eq "both")) {
          Write-Error "macOS asset (Decentraland_macos_epic.zip) not found in latest release $version"
          exit 1
        }

        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "windows_url=$windowsUrl" >> $env:GITHUB_OUTPUT
        echo "macos_url=$macosUrl" >> $env:GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Ensure BuildRoot and CloudDir paths exist for Windows
      if: steps.platforms.outputs.build_windows == 'True'
      run: |
        New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Windows" -Force
        New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\BuildPatchTool\CloudDir_Windows" -Force

    - name: Ensure BuildRoot and CloudDir paths exist for macOS
      if: steps.platforms.outputs.build_mac == 'True'
      run: |
        New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Mac" -Force
        New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\BuildPatchTool\CloudDir_Mac" -Force

    - name: Download Windows build artifact
      if: steps.platforms.outputs.build_windows == 'True'
      run: |
        echo "Downloading Windows build artifact..."
        curl -L --fail -o "$env:RUNNER_TEMP\Decentraland_windows64_epic.zip" "${{ steps.get_release.outputs.windows_url }}"
        echo "Extracting Windows build artifact..."
        Expand-Archive -Path "$env:RUNNER_TEMP\Decentraland_windows64_epic.zip" -DestinationPath "$env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Windows"
        Remove-Item -Path "$env:RUNNER_TEMP\Decentraland_windows64_epic.zip"
        echo "Windows build artifact extracted to $env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Windows"

    - name: Download macOS build artifact
      if: steps.platforms.outputs.build_mac == 'True'
      run: |
        echo "Downloading macOS build artifact..."
        curl -L --fail -o "$env:RUNNER_TEMP\Decentraland_macos_epic.zip" "${{ steps.get_release.outputs.macos_url }}"
        echo "Extracting macOS build artifact..."
        Expand-Archive -Path "$env:RUNNER_TEMP\Decentraland_macos_epic.zip" -DestinationPath "$env:RUNNER_TEMP\MacBuildTemp"
        tar -xf "$env:RUNNER_TEMP\MacBuildTemp\build.tar" -C "$env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Mac"
        Remove-Item -Recurse -Force "$env:RUNNER_TEMP\MacBuildTemp"
        Remove-Item -Path "$env:RUNNER_TEMP\Decentraland_macos_epic.zip"
        echo "macOS build artifact extracted to $env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Mac"

    - name: Get BuildPatchTool cache key
      id: bpt_version
      run: |
        $headers = curl -sI --max-redirs 0 "https://launcher-public-service-prod06.ol.epicgames.com/launcher/api/installer/download/BuildPatchTool.zip"
        $location = ($headers | Select-String "^location:").ToString().Trim()

        if ($location -match '/(BuildPatchTool[^?]+\.zip)') {
          $cacheKey = "buildpatchtool-" + $Matches[1]
        } else {
          $cacheKey = "buildpatchtool-week-" + (Get-Date).ToString("yyyy-WW")
        }

        Write-Host "Cache key: $cacheKey"
        echo "cache_key=$cacheKey" >> $env:GITHUB_OUTPUT

    - name: Cache BuildPatchTool
      id: bpt_cache
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}\BuildPatchTool\Engine
        key: ${{ steps.bpt_version.outputs.cache_key }}

    - name: Download BuildPatchTool
      if: steps.bpt_cache.outputs.cache-hit != 'true'
      run: |
        echo "Downloading BuildPatchTool..."
        Invoke-WebRequest -Uri "https://launcher-public-service-prod06.ol.epicgames.com/launcher/api/installer/download/BuildPatchTool.zip" -OutFile "$env:RUNNER_TEMP\BuildPatchTool.zip"
        echo "Extracting BuildPatchTool..."
        Expand-Archive -Path "$env:RUNNER_TEMP\BuildPatchTool.zip" -DestinationPath "$env:RUNNER_TEMP\BuildPatchTool"
        Remove-Item -Path "$env:RUNNER_TEMP\BuildPatchTool.zip"
        echo "BuildPatchTool extracted"

    - name: Add BuildPatchTool to PATH
      run: echo "$env:RUNNER_TEMP\BuildPatchTool\Engine\Binaries\Win64" >> $env:GITHUB_PATH

    - name: Upload Windows artifact
      if: steps.platforms.outputs.build_windows == 'True'
      run: |
        BuildPatchTool.exe `
        -OrganizationId="${{ secrets.EPIC_STORE_ORG_ID }}" `
        -ProductId="${{ secrets.EPIC_STORE_PRODUCT_ID }}" `
        -ArtifactId="${{ secrets.EPIC_STORE_ARTIFACT_ID }}" `
        -ClientId="${{ secrets.EPIC_STORE_CLIENT_ID }}" `
        -ClientSecret="${{ secrets.EPIC_STORE_CLIENT_SECRET }}" `
        -mode=UploadBinary `
        -BuildRoot="$env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Windows" `
        -CloudDir="$env:RUNNER_TEMP\BuildPatchTool\CloudDir_Windows" `
        -BuildVersion="${{ steps.get_release.outputs.version }}-win" `
        -AppLaunch="Decentraland.exe" `
        -AppArgs=""

    - name: Upload macOS artifact
      if: steps.platforms.outputs.build_mac == 'True'
      run: |
        BuildPatchTool.exe `
        -OrganizationId="${{ secrets.EPIC_STORE_ORG_ID }}" `
        -ProductId="${{ secrets.EPIC_STORE_PRODUCT_ID }}" `
        -ArtifactId="${{ secrets.EPIC_STORE_ARTIFACT_ID }}" `
        -ClientId="${{ secrets.EPIC_STORE_CLIENT_ID }}" `
        -ClientSecret="${{ secrets.EPIC_STORE_CLIENT_SECRET }}" `
        -mode=UploadBinary `
        -BuildRoot="$env:RUNNER_TEMP\BuildPatchTool\BuildRoot_Mac\build" `
        -CloudDir="$env:RUNNER_TEMP\BuildPatchTool\CloudDir_Mac" `
        -BuildVersion="${{ steps.get_release.outputs.version }}-mac" `
        -AppLaunch="Decentraland.app/Contents/MacOS/Explorer" `
        -AppArgs="" `
        -Platform="Mac"

    - name: Post-upload instructions
      if: steps.platforms.outputs.build_windows == 'True' || steps.platforms.outputs.build_mac == 'True'
      run: |
        $summary = @"
        ## Upload Complete: ${{ steps.get_release.outputs.version }}

        Next manual steps required in the [Developer Portal](https://dev.epicgames.com/portal):

        1. Navigate to **Your Product > Epic Games Store > Artifacts and Binaries**
        2. Set the uploaded binary as **Active**
        3. Add a label: **Bugfix** / **Minor Update** / **Major Update**
        4. Add patch notes *(mandatory for Major Update)*
        "@
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

    - name: Log BuildPatchTool log if upload fails
      if: failure()
      run: |
        if (Test-Path "C:\Users\runneradmin\AppData\Local\BuildPatchTool\Saved\Logs\BuildPatchTool.log") {
          Write-Host "Contents of BuildPatchTool.log:"
          Get-Content -Path "C:\Users\runneradmin\AppData\Local\BuildPatchTool\Saved\Logs\BuildPatchTool.log" -Tail 100
        } else {
          Write-Host "BuildPatchTool.log not found."
        }
