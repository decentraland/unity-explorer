name: Claude Re-Review (On Request)
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  re-review:
    if: contains(github.event.comment.body, '@claude re-review') || contains(github.event.comment.body, '@claude approve')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            A re-review has been requested. Review the current state of the PR diff and check 
            whether previously raised issues have been addressed.

            If all issues are resolved, submit an APPROVE review.
            If issues remain, submit a REQUEST_CHANGES review listing what's still outstanding.
            If it's unclear, submit a COMMENT review.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"
