name: Triage Issues
on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Triage Issues using specification from docs/ directory.'
        required: true
jobs:
  label_issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: AI label analysis
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "sentry"
          prompt: |
            You are an issue triage assistant. Your job is to apply labels and post a brief analysis comment.
            Repository: ${{ github.repository }}
            Issue: #${{ github.event.issue.number || github.event.inputs.issue_number }}

            Context:
            - The repository has rich product and engineering documentation under the docs/ directory.
            - Incident severity, hotfix rules, and SEV-1/SEV-2 definitions are documented in docs/incident-management-and-hotfix-policy.md.
            - Primary vs Secondary categories (used to decide whether SEV-2 implies hotfix-level priority) are listed in docs/primary-and-secondary-categories-when-to-hotfix.md.
            - Use those docs as guidance when inferring severity/priority from user impact, but you must still map to existing GitHub labels only.

            Steps:
            1. Fetch all available labels:
               gh label list --repo ${{ github.repository }} --json name,description --limit 100 > /tmp/labels.json
            2. Fetch the issue details:
               gh issue view ${{ github.event.issue.number || github.event.inputs.issue_number }} --repo ${{ github.repository }} --json title,body,labels > /tmp/issue.json
            3. Analyze the issue and select appropriate labels by considering:
               - The type of issue (bug, feature request, question, improvement, etc.)
               - Technical areas or components mentioned
               - Severity or priority indicators, informed by the docs/incident-management-and-hotfix-policy.md guidelines where relevant
               - Platform mentions (e.g. desktop, web, mobile)
               - User impact described
            4. Create a summary report:
               Save your analysis and decisions to /tmp/label_analysis.md in this format:
               ## Issue Triage Summary
               **Issue:** #[number]
               **Title:** [title]
               **Analysis:** [your reasoning]
               **Selected Labels:** [list of labels]
               **Applied:** [yes/no]
            5. Apply labels using:
               gh issue edit ${{ github.event.issue.number || github.event.inputs.issue_number }} --repo ${{ github.repository }} --add-label "label1" --add-label "label2"
            6. Post your analysis as a comment on the issue:
               gh issue comment ${{ github.event.issue.number || github.event.inputs.issue_number }} --repo ${{ github.repository }} --body "$(cat /tmp/label_analysis.md)"

            Rules:
            - ALWAYS include a priority label (low, medium, high, critical).
            - Only select from labels that already exist in the repository.
            - Be specific but comprehensive — apply all labels that clearly match.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --model claude-haiku-4-5-20251001 --allowedTools "Bash(gh label list:*),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*)"

      - name: Copy Claude execution output to artifacts
        if: always()
        run: |
          if [ -f /home/runner/work/_temp/claude-execution-output.json ]; then
            cp /home/runner/work/_temp/claude-execution-output.json artifacts/claude-execution-output_${{ github.event.issue.number || github.event.inputs.issue_number }}.json
            echo "✓ Claude execution output captured"
          else
            echo "⚠ Claude execution output not found"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: label-analysis-${{ github.event.issue.number || github.event.inputs.issue_number }}
          path: artifacts/
          retention-days: 90
