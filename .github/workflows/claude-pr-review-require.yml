name: Require Claude Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  set-pending:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Check PR type
        id: check-type
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const isAutoReview = /^(fix|chore)(\(.*?\))?!?:/i.test(title);
            core.setOutput('is-auto-review', isAutoReview.toString());

      - name: Set pending status for feature PRs
        if: steps.check-type.outputs.is-auto-review == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'pending',
              context: 'Claude Review',
              description: 'Awaiting Claude review — comment @claude review to trigger'
            });
