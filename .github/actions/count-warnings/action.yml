name: 'Count Warnings'
description: 'Filter InspectCode false positives and count the remaining C# warnings. Single source of truth for the warning ratchet.'
inputs:
  report:
    description: 'Path to the raw InspectCode SARIF/JSON report'
    required: false
    default: 'InspectCodeReport.json'
  filtered_output:
    description: 'Path to write the filtered results array to'
    required: false
    default: 'filtered.json'
outputs:
  count:
    description: 'Number of warnings remaining after filtering false positives'
    value: ${{ steps.count.outputs.count }}
runs:
  using: "composite"
  steps:
    - name: Filter false positives and count
      id: count
      shell: bash
      run: |
        set -euo pipefail
        count=$(bash "$GITHUB_WORKSPACE/scripts/lint/filter-warnings.sh" "${{ inputs.report }}" "${{ inputs.filtered_output }}")
        echo "count=$count" >> "$GITHUB_OUTPUT"
        echo "Warning count: $count"
